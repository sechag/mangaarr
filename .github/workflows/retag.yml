name: Retag GHCR image

on:
  workflow_dispatch:

jobs:
  retag:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Retag old digest as latest
        run: |
          crane tag ghcr.io/sechag/mangaarr@sha256:9404e0a9c9933f3516bfa87f98f7d1532be75cbf404ead9225bdfad90e81949f latest

      - name: Delete new version via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method DELETE /user/packages/container/mangaarr/versions/891316186
