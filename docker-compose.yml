# ──────────────────────────────────────────────────────────────
#  MangaArr — docker-compose.yml
#
#  POUR INSTALLER : tu n'as qu'UNE chose à faire →
#  remplacer les chemins « /chemin/vers/... » à GAUCHE des volumes
#  par TES dossiers sur le serveur/NAS.
#
#  La partie à DROITE des « : » (/media, /incoming, /qbt-category…)
#  ne se touche PAS : ce sont des chemins internes au conteneur,
#  déjà configurés dans l'image. Aucune variable d'environnement
#  n'est obligatoire.
# ──────────────────────────────────────────────────────────────
services:
  mangaarr:
    # Image publiée sur GitHub Container Registry.
    # Pour épingler une version stable : ghcr.io/sechag/mangaarr:v1.0.9
    image: ghcr.io/sechag/mangaarr:latest
    # (Pour builder depuis les sources, remplace la ligne ci-dessus par : build: .)
    container_name: mangaarr
    restart: unless-stopped
    ports:
      - "7474:7474"          # http://IP-DU-SERVEUR:7474

    volumes:
      # ── Données persistantes de MangaArr ────────────────────────
      # Adapte la GAUCHE vers un dossier serveur dédié (ex. Unraid : /mnt/user/appdata/mangaarr).
      - /mnt/user/appdata/mangaarr/config:/data/config
      - /mnt/user/appdata/mangaarr/cache:/data/cache

      # ── TES dossiers : remplace UNIQUEMENT la partie de gauche ──
      #
      # Incoming eMule/aMule (téléchargements finis) — lecture seule
      - /chemin/vers/aMule/Incoming:/incoming:ro
      #
      # Destination des séries (bibliothèque finale)
      - /chemin/vers/Mangas:/media:rw
      #
      # Dossier où qBittorrent dépose les torrents terminés.
      # ⚠️ Doit être le MÊME dossier physique que le « save path » de
      #    ta catégorie qBittorrent, pour que MangaArr voie les fichiers.
      - /chemin/vers/qbittorrent/Mangaarr:/qbt-category:rw
      #
      # Stockage des .torrent récupérés par MangaArr (peut être un dossier vide dédié)
      - /chemin/vers/torrent_files:/torrent_files:rw
      #
      # Téléchargements Telegram (optionnel — laisse tel quel si tu n'utilises pas Telegram)
      - /chemin/vers/telegram_downloads:/telegram:rw

    environment:
      # Fuseau horaire (seule variable utile à régler).
      - TZ=Europe/Paris

      # ── Réglages avancés (facultatifs) ──────────────────────────
      # Tout le reste a déjà des valeurs par défaut dans l'image :
      #   MANGAARR_QBT_WATCH=/qbt-category   MANGAARR_TORRENT_FILES=/torrent_files
      #   MANGAARR_DEST=/media   MANGAARR_INCOMING=/incoming   MANGAARR_TELEGRAM_WATCH=/telegram
      # Décommente seulement si tu veux changer le défaut :
      # - MANGAARR_INCOMING_INTERVAL=60   # Fréquence du scan Incoming (secondes)
      # - MANGAARR_PORT=7474              # Port HTTP interne
